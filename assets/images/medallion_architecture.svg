<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="300" fill="#0f0f1a" rx="12"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#e0e0ff">Medallion Architecture — Bronze · Silver · Gold</text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#888">Databricks Lakehouse design pattern for progressive data refinement</text>

  <!-- ========================================= -->
  <!-- BRONZE -->
  <!-- ========================================= -->
  <rect x="30" y="70" width="240" height="190" rx="10" fill="#3d1a00" stroke="#cd7f32" stroke-width="2.5"/>
  <rect x="30" y="70" width="240" height="36" rx="10" fill="#cd7f32"/>
  <text x="150" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">🥉 Bronze</text>
  <text x="150" y="108" text-anchor="middle" font-size="10" fill="#fff">Raw ingestion layer</text>

  <text x="50" y="130" font-size="11" fill="#ffcba4">Purpose:</text>
  <text x="50" y="146" font-size="11" fill="#e0c090">Exact copy of source data</text>
  <text x="50" y="162" font-size="11" fill="#ffcba4">Transformations:</text>
  <text x="50" y="178" font-size="11" fill="#e0c090">None or minimal (cast types)</text>
  <text x="50" y="194" font-size="11" fill="#ffcba4">Format:</text>
  <text x="50" y="210" font-size="11" fill="#e0c090">Delta (raw schema)</text>
  <text x="50" y="226" font-size="11" fill="#ffcba4">Example:</text>
  <text x="50" y="242" font-size="11" fill="#e0c090">customers_raw, orders_raw</text>

  <!-- ARROW Bronze → Silver -->
  <line x1="270" y1="165" x2="320" y2="165" stroke="#999" stroke-width="2" marker-end="url(#arr)"/>
  <text x="295" y="155" text-anchor="middle" font-size="10" fill="#ccc">clean</text>
  <text x="295" y="178" text-anchor="middle" font-size="10" fill="#ccc">dedupe</text>

  <!-- ========================================= -->
  <!-- SILVER -->
  <!-- ========================================= -->
  <rect x="320" y="70" width="240" height="190" rx="10" fill="#1a1a1a" stroke="#c0c0c0" stroke-width="2.5"/>
  <rect x="320" y="70" width="240" height="36" rx="10" fill="#7a7a7a"/>
  <text x="440" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">🥈 Silver</text>
  <text x="440" y="108" text-anchor="middle" font-size="10" fill="#ddd">Cleaned &amp; conformed layer</text>

  <text x="340" y="130" font-size="11" fill="#d0d0d0">Purpose:</text>
  <text x="340" y="146" font-size="11" fill="#bbb">Cleaned, validated, enriched</text>
  <text x="340" y="162" font-size="11" fill="#d0d0d0">Transformations:</text>
  <text x="340" y="178" font-size="11" fill="#bbb">Filter nulls, cast, join dims</text>
  <text x="340" y="194" font-size="11" fill="#d0d0d0">Format:</text>
  <text x="340" y="210" font-size="11" fill="#bbb">Delta (enforced schema)</text>
  <text x="340" y="226" font-size="11" fill="#d0d0d0">Example:</text>
  <text x="340" y="242" font-size="11" fill="#bbb">customers_clean, orders_clean</text>

  <!-- ARROW Silver → Gold -->
  <line x1="560" y1="165" x2="610" y2="165" stroke="#999" stroke-width="2" marker-end="url(#arr)"/>
  <text x="585" y="155" text-anchor="middle" font-size="10" fill="#ccc">aggregate</text>
  <text x="585" y="178" text-anchor="middle" font-size="10" fill="#ccc">model</text>

  <!-- ========================================= -->
  <!-- GOLD -->
  <!-- ========================================= -->
  <rect x="610" y="70" width="255" height="190" rx="10" fill="#2a1f00" stroke="#ffd700" stroke-width="2.5"/>
  <rect x="610" y="70" width="255" height="36" rx="10" fill="#d4a017"/>
  <text x="737" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">🥇 Gold</text>
  <text x="737" y="108" text-anchor="middle" font-size="10" fill="#fff">Business-ready layer</text>

  <text x="630" y="130" font-size="11" fill="#ffe599">Purpose:</text>
  <text x="630" y="146" font-size="11" fill="#f0d580">Aggregated for BI &amp; reporting</text>
  <text x="630" y="162" font-size="11" fill="#ffe599">Transformations:</text>
  <text x="630" y="178" font-size="11" fill="#f0d580">GROUP BY, KPIs, star schema</text>
  <text x="630" y="194" font-size="11" fill="#ffe599">Format:</text>
  <text x="630" y="210" font-size="11" fill="#f0d580">Delta (optimised, Z-ORDER)</text>
  <text x="630" y="226" font-size="11" fill="#ffe599">Example:</text>
  <text x="630" y="242" font-size="11" fill="#f0d580">sales_by_region, customer_kpis</text>

  <!-- Source label (left) -->
  <text x="15" y="165" font-size="11" fill="#666" transform="rotate(-90, 15, 165)">Raw Sources</text>

  <!-- Defs -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
  </defs>

</svg>
