<svg xmlns="http://www.w3.org/2000/svg" width="860" height="340" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="860" height="340" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Partitions — Unit of Parallelism in Spark</text>

  <!-- Large DataFrame -->
  <rect x="60" y="56" width="740" height="60" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="430" y="81" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">DataFrame — Large Dataset (e.g. 4 GB Parquet file)</text>
  <text x="430" y="101" text-anchor="middle" font-size="11" fill="#1e3a8a">spark.read.parquet("/data/orders/*")  →  Spark automatically splits into partitions</text>

  <!-- Arrow down -->
  <line x1="430" y1="118" x2="430" y2="138" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowDown)"/>
  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,8 z" fill="#6b7280"/>
    </marker>
    <marker id="arrowUp" markerWidth="8" markerHeight="8" refX="3" refY="0" orient="auto">
      <path d="M0,8 L6,8 L3,0 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Partitions row -->
  <!-- Partition 0 -->
  <rect x="60" y="140" width="160" height="90" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="140" y="163" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">Partition 0</text>
  <text x="140" y="182" text-anchor="middle" font-size="11" fill="#166534">~128 MB</text>
  <text x="140" y="198" text-anchor="middle" font-size="10" fill="#166534">rows 1 – 500 000</text>
  <text x="140" y="214" text-anchor="middle" font-size="10" fill="#4b5563">→ 1 Task</text>

  <!-- Partition 1 -->
  <rect x="240" y="140" width="160" height="90" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="320" y="163" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">Partition 1</text>
  <text x="320" y="182" text-anchor="middle" font-size="11" fill="#166534">~128 MB</text>
  <text x="320" y="198" text-anchor="middle" font-size="10" fill="#166534">rows 500 001 – 1 000 000</text>
  <text x="320" y="214" text-anchor="middle" font-size="10" fill="#4b5563">→ 1 Task</text>

  <!-- Partition 2 -->
  <rect x="420" y="140" width="160" height="90" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="500" y="163" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">Partition 2</text>
  <text x="500" y="182" text-anchor="middle" font-size="11" fill="#166534">~128 MB</text>
  <text x="500" y="198" text-anchor="middle" font-size="10" fill="#166534">rows 1 000 001 – 1 500 000</text>
  <text x="500" y="214" text-anchor="middle" font-size="10" fill="#4b5563">→ 1 Task</text>

  <!-- Partition 3 -->
  <rect x="600" y="140" width="200" height="90" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="700" y="163" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">Partition N</text>
  <text x="700" y="182" text-anchor="middle" font-size="11" fill="#166534">~128 MB</text>
  <text x="700" y="198" text-anchor="middle" font-size="10" fill="#166534">last rows</text>
  <text x="700" y="214" text-anchor="middle" font-size="10" fill="#4b5563">→ 1 Task</text>

  <!-- Arrows down to Executors -->
  <line x1="140" y1="232" x2="140" y2="252" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="320" y1="232" x2="320" y2="252" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="500" y1="232" x2="500" y2="252" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="700" y1="232" x2="700" y2="252" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Executor Cores -->
  <rect x="80" y="254" width="120" height="34" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="140" y="266" text-anchor="middle" font-size="11" fill="#78350f">Executor Core 0</text>
  <text x="140" y="280" text-anchor="middle" font-size="10" fill="#78350f">Worker Node 1</text>

  <rect x="260" y="254" width="120" height="34" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="320" y="266" text-anchor="middle" font-size="11" fill="#78350f">Executor Core 1</text>
  <text x="320" y="280" text-anchor="middle" font-size="10" fill="#78350f">Worker Node 1</text>

  <rect x="440" y="254" width="120" height="34" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="500" y="266" text-anchor="middle" font-size="11" fill="#78350f">Executor Core 2</text>
  <text x="500" y="280" text-anchor="middle" font-size="10" fill="#78350f">Worker Node 2</text>

  <rect x="640" y="254" width="120" height="34" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="700" y="266" text-anchor="middle" font-size="11" fill="#78350f">Executor Core N</text>
  <text x="700" y="280" text-anchor="middle" font-size="10" fill="#78350f">Worker Node 2</text>

  <!-- Key insight box -->
  <rect x="60" y="300" width="740" height="28" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="430" y="319" text-anchor="middle" font-size="11" fill="#78350f">🔑 More partitions = more parallelism. Too few partitions → some cores idle. Too many → scheduling overhead. Default: ~128 MB per partition.</text>
</svg>
